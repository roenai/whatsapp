<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>roen — Product Demos</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family:'Cooper BT';
  src:url('https://db.onlinewebfonts.com/t/2a88cde81e30e1095a498e3aa7ae3a0d.woff2') format('woff2');
  font-weight:600; font-style:normal; font-display:swap;
}
:root{
  --black:#0A0A0A;--white:#FFFFFF;--green:#00C853;
  --gray:#8A8A8A;--surface:#141414;--border:#2A2A2A;--dim:#4a4a4a;
  --logo:'Cooper BT',Georgia,serif;
  --heading:'Open Sans',system-ui,sans-serif;
  --body:'Open Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;}
body{font-family:var(--body);background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden;}

body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,200,83,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at var(--gx,50%) var(--gy,40%), rgba(20,80,70,0.35) 0%, transparent 65%);
  animation:glowDrift 12s ease-in-out infinite alternate;
}
@keyframes glowDrift{
  0%{--gx:40%;--gy:35%;}25%{--gx:55%;--gy:45%;}50%{--gx:60%;--gy:30%;}75%{--gx:45%;--gy:50%;}100%{--gx:50%;--gy:35%;}
}
@property --gx{syntax:'<percentage>';inherits:false;initial-value:50%;}
@property --gy{syntax:'<percentage>';inherits:false;initial-value:40%;}

.page{position:relative;z-index:1;}

.nav{padding:24px 48px;display:flex;justify-content:space-between;align-items:center;}
.nav-logo{display:flex;align-items:center;cursor:pointer;}
.nav-logo-img{height:28px;width:auto;}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.nav-right{font-family:var(--mono);font-size:9px;font-weight:400;color:var(--dim);text-transform:uppercase;letter-spacing:2px;}

.hero{text-align:center;padding:48px 48px 20px;max-width:720px;margin:0 auto;}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10px;font-weight:400;
  color:var(--gray);letter-spacing:1.5px;text-transform:uppercase;
  padding:7px 14px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
  margin-bottom:20px;
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,0.6);opacity:1;}
  50%{box-shadow:0 0 0 5px rgba(0,200,83,0);opacity:0.8;}
}
.hero h1{
  font-size:clamp(32px,5vw,52px);
  font-weight:500;line-height:1.1;letter-spacing:-0.5px;margin-bottom:16px;
}
.hero p{font-size:15px;font-weight:300;color:var(--gray);line-height:1.75;max-width:520px;margin:0 auto;}

.agents-bar{text-align:center;padding:8px 48px 0;}
.agents-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--mono);font-size:8px;color:var(--dim);
  letter-spacing:1.5px;text-transform:uppercase;
}
.agents-count{
  font-family:var(--heading);font-size:11px;font-weight:600;
  color:var(--green);background:rgba(0,200,83,.1);
  padding:2px 7px;border-radius:4px;
}

.capsules{max-width:900px;margin:0 auto;padding:32px 48px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}

.capsule{
  padding:24px 28px;border:1px solid var(--border);border-radius:12px;
  background:var(--surface);cursor:pointer;transition:all .25s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:12px;text-decoration:none;color:inherit;
}
.capsule:hover{border-color:rgba(0,200,83,.35);background:rgba(0,200,83,.03);transform:translateY(-2px);}

.cap-icon{font-size:24px;}
.cap-info{}
.cap-title{font-family:var(--heading);font-size:14px;font-weight:600;color:var(--white);margin-bottom:3px;}
.cap-desc{font-size:11.5px;font-weight:300;color:var(--gray);line-height:1.5;}
.cap-tag{
  display:inline-block;margin-top:6px;
  font-family:var(--mono);font-size:7.5px;font-weight:400;
  letter-spacing:1px;text-transform:uppercase;
}

.capsule-soon{
  padding:24px 28px;border:1px dashed var(--dim);border-radius:12px;
  background:transparent;cursor:default;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:10px;opacity:0.45;pointer-events:none;
}
.capsule-soon .cap-icon{font-size:20px;}
.capsule-soon .cap-title{font-family:var(--heading);font-size:13px;font-weight:400;color:var(--gray);}

.foot{padding:24px 48px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:40px;}
.foot-logo{display:flex;align-items:center;text-decoration:none;}
.foot-logo-img{height:20px;width:auto;opacity:0.35;}
.foot-d{width:3px;height:3px;border-radius:50%;background:var(--green);}
.foot-link{font-family:var(--mono);font-size:8px;color:var(--dim);text-decoration:none;letter-spacing:1.5px;text-transform:uppercase;}.foot-link:hover{color:var(--gray);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

@media(max-width:700px){
  .nav{padding:16px 20px;}
  .hero{padding:28px 20px 16px;}
  .hero h1{font-size:26px;}
  .hero p{font-size:13px;}
  .capsules{padding:20px 20px 16px;grid-template-columns:1fr;gap:10px;}
  .capsule{padding:16px 18px;gap:12px;}
  .cap-icon{font-size:20px;}
  .cap-title{font-size:13px;}
  .cap-desc{font-size:11px;}
  .foot{padding:16px 20px;}
  .agents-bar{padding:4px 20px 0;}
}
</style>
</head>

<script>
var demos = [
  {file:'demo-whatsapp-to-quote.html', icon:'💬', title:'WhatsApp to Quote', desc:'Describe a job on WhatsApp, get an itemised quote back in seconds. Voice or text.', tag:'@quote agent', color:'#00C853'},
  {file:'demo-speech-to-rfi.html', icon:'🎙️', title:'Speech to RFI', desc:'Voice note or photo from site turns into a formal RFI, routed to the right consultant.', tag:'@rfi agent', color:'#4A8FD4'},
  {file:'demo-change-orders.html', icon:'📋', title:'Change Orders', desc:'Describe the change — roen calculates cost impact, schedule impact, and drafts the CO.', tag:'@co agent', color:'#9C4DCC'},
  {file:'demo-contracts.html', icon:'📑', title:'Contract Management', desc:'Ask any contract question in plain language. Get the exact clause reference back instantly.', tag:'@contract agent', color:'#3D6FD4'},
  {file:'demo-schedule.html', icon:'📅', title:'Schedule Intelligence', desc:'Report delays or progress. roen recalculates the critical path and notifies affected trades.', tag:'@schedule agent', color:'#00BFA5'},
  {file:'demo-budget.html', icon:'💰', title:'Budget Tracker', desc:'Real-time budget status, cost-to-complete, and margin tracking from your phone.', tag:'@budget agent', color:'#7C6BC0'},
  {file:'demo-daily-logs.html', icon:'📝', title:'Daily Logs', desc:'Walk the site, send a voice note. roen writes the formal daily report automatically.', tag:'@workflow agent', color:'#A0896A'}
];

var container = document.getElementById('capsules');
demos.forEach(function(d) {
  var el = document.createElement('a');
  el.className = 'capsule';
  el.href = d.file;
  el.innerHTML = '<div class="cap-icon">' + d.icon + '</div><div class="cap-info"><div class="cap-title">' + d.title + '</div><div class="cap-desc">' + d.desc + '</div><span class="cap-tag" style="color:' + d.color + '">' + d.tag + '</span></div>';

});

var soon = document.createElement('div');
soon.className = 'capsule-soon';
soon.innerHTML = '<div class="cap-icon">✦</div><div class="cap-title">More Coming Soon</div>';
container.appendChild(soon);

// Equalize all card heights to the tallest card
requestAnimationFrame(function() {
  var cards = container.querySelectorAll('.capsule, .capsule-soon');
  var max = 0;
  cards.forEach(function(c) { max = Math.max(max, c.offsetHeight); });
  cards.forEach(function(c) { c.style.minHeight = max + 'px'; });
});
</script>
